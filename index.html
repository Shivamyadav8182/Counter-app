<!DOCTYPE html>
<html lang="en">

<head>
    <link rel = "stylesheet"
    href="https://use.fontawesome.com/releases/v6.4.2/css/all.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
<!--  wrapper -->
    <div style="width: 100vw; height: 100vh; display :columns flex;justify-items: center; align-items: center; background-color: #344151; gap: -10; padding: 20%;" >
        <div style="padding: 20px; font-size: 20px; color: #0398d4;  ">Increment and Decrement</div>
  
        <div style=  " background-color: white;    font-size: 30px; border-radius: 3px; color: #0398d4; display: flex;">
            <!-- negative button -->
            <button  onclick = "decrement()" style="border:2px solid #bfbfbf;  padding-left: 20px; padding-right: 20px; display:flex; justify-content: center; align-items: center; ">
                <i class="fa-solid fa-minus"></i>
            </button>

            <div  id="counter" style=" font-weight: bold; padding-left: 20px; padding-right: 20px;">
                0
            </div>
           <!-- positive button  -->
            <button onclick = "increment()" style="border-left: 2px solid #bfbfbf;  padding-right:  20px; padding-left: 20px; display:flex ; justify-content: center; align-items: center; ">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
    </div>
    <!-- <script src="https://kit.fontawesome.com/58a810656e.js" crossorigin="anonymous"></script> -->
     <script src="index.js"></script>
</body>

</html>
